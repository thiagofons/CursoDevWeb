<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Elementos flutuantes</title>

	<style type="text/css">
		
		#principal{
			border: 5px solid red;
			background: green;
		}

		.conteudo{
			background: blue;
			border: 1px solid gray;
			width: 200px;
			height: 200px;
			margin: 10px;
			float: right;
		}
		/*
		.conteudo1{
			background: red;
			border: 1px solid gray;
			width: 200px;
			height: 200px;
			margin: 10px;
			float: left;
		}
		*/

		.conteudo-zero{
			background: red;
			border: 1px solid gray;
			width: 200px;
			height: 200px;
			margin: 10px;
		}

		.clear{
			clear: both;
		}

	</style>
</head>

<body>
	<div id="principal">
		<div class="conteudo">
			Conteudo 1
		</div class="conteudo">

		<div class="conteudo">
			Conteudo 2
		</div class="conteudo">

		<div class="conteudo">
			Conteudo 3
		</div>

		<div class="clear"></div>
	</div>
	

</body>
</html>
